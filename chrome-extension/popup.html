<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadMed — IndiaMART Capture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Outfit', sans-serif;
      background: #0a0f1e;
      color: #f1f5f9;
      user-select: none;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 1.6rem; }
    .header-text h1 { font-size: 1rem; font-weight: 700; background: linear-gradient(135deg,#818cf8,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header-text p { font-size: 0.72rem; color: #64748b; margin-top: 1px; }

    /* Body */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* Status card */
    .status-card {
      background: rgba(20,30,55,0.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected    { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.6); animation: glow 2s infinite; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.capturing   { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.6); animation: glow 1s infinite; }
    @keyframes glow { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .status-text { flex: 1; }
    .status-text .label { font-size: 0.82rem; font-weight: 600; }
    .status-text .sub   { font-size: 0.72rem; color: #64748b; margin-top: 1px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-box {
      background: rgba(20,30,55,0.6);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-box .num { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .stat-box .lbl { font-size: 0.65rem; color: #64748b; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-box.captured .num { color: #60a5fa; }
    .stat-box.sent     .num { color: #10b981; }
    .stat-box.score    .num { color: #f59e0b; }

    /* Controls */
    .controls { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px; border-radius: 8px; border: none;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex;
      align-items: center; justify-content: center; gap: 6px;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-capture  { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .btn-capture:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,0.5); }
    .btn-stop     { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-stop:hover:not(:disabled) { background: rgba(239,68,68,0.25); }
    .btn-dashboard { background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); flex: 0 0 auto; padding: 10px 14px; }
    .btn-dashboard:hover { background: rgba(255,255,255,0.1); color: #f1f5f9; }

    /* Backend URL input */
    .input-section { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 0.72rem; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    .url-row { display: flex; gap: 6px; }
    .url-input {
      flex: 1; padding: 8px 10px; border-radius: 7px;
      background: rgba(10,15,30,0.7); border: 1px solid rgba(255,255,255,0.08);
      color: #f1f5f9; font-family: inherit; font-size: 0.8rem;
    }
    .url-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    .btn-save { padding: 8px 12px; background: #6366f1; color: white; border: none; border-radius: 7px; font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-save:hover { background: #4f46e5; }

    /* Recent leads list */
    .recent-section { display: flex; flex-direction: column; gap: 6px; }
    .section-title { font-size: 0.72rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; display: flex; justify-content: space-between; }
    .lead-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
    .lead-item {
      background: rgba(20,30,55,0.6); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 7px; padding: 7px 10px; font-size: 0.78rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .lead-name { font-weight: 600; color: #e2e8f0; }
    .lead-meta { font-size: 0.7rem; color: #64748b; margin-top: 1px; }
    .lead-score { font-weight: 700; font-size: 0.72rem; padding: 1px 5px; border-radius: 4px; }
    .score-high   { background: rgba(16,185,129,0.2); color: #10b981; }
    .score-medium { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .score-low    { background: rgba(100,116,139,0.2); color: #94a3b8; }

    .empty-state { text-align: center; color: #475569; font-size: 0.78rem; padding: 12px; }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }
    .footer-btn {
      flex: 1; padding: 7px; border-radius: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: #64748b; font-family: inherit; font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; text-align: center; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .footer-btn:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">💊</div>
    <div class="header-text">
      <h1>LeadMed Pro</h1>
      <p>IndiaMART Lead Capture</p>
    </div>
  </div>

  <div class="body">
    <!-- Status -->
    <div class="status-card" id="status-card">
      <div class="status-dot disconnected" id="status-dot"></div>
      <div class="status-text">
        <div class="label" id="status-label">Checking connection…</div>
        <div class="sub" id="status-sub">Backend: <span id="backend-url-display">localhost:3001</span></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box captured">
        <div class="num" id="stat-captured">0</div>
        <div class="lbl">Captured</div>
      </div>
      <div class="stat-box sent">
        <div class="num" id="stat-sent">0</div>
        <div class="lbl">Sent</div>
      </div>
      <div class="stat-box score">
        <div class="num" id="stat-score">—</div>
        <div class="lbl">Avg Score</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-capture" id="btn-capture">▶ Start Capture</button>
      <button class="btn btn-stop" id="btn-stop" disabled>■ Stop</button>
      <button class="btn btn-dashboard" id="btn-dashboard" title="Open Dashboard">📊</button>
    </div>

    <!-- Backend URL -->
    <div class="input-section">
      <div class="input-label">Backend URL</div>
      <div class="url-row">
        <input type="text" class="url-input" id="backend-url" placeholder="http://localhost:3001" />
        <button class="btn-save" id="btn-save-url">Save</button>
      </div>
    </div>

    <!-- API Token -->
    <div class="input-section">
      <div class="input-label">API Token</div>
      <div class="url-row">
        <input type="password" class="url-input" id="api-token" placeholder="Paste your API Token / JWT here" />
        <button class="btn-save" id="btn-save-token">Save</button>
      </div>
    </div>

    <!-- Recent Leads -->
    <div class="recent-section">
      <div class="section-title">
        <span>Recent Captures</span>
        <span id="lead-count-label">0 leads</span>
      </div>
      <div class="lead-list" id="lead-list">
        <div class="empty-state">No leads captured yet.<br/>Navigate to IndiaMART seller panel to start.</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a class="footer-btn" id="btn-open-indiamart" href="https://seller.indiamart.com/leadmanager/" target="_blank">🌐 IndiaMART</a>
    <button class="footer-btn" id="btn-clear">🗑 Clear</button>
    <a class="footer-btn" id="btn-options" href="options.html" target="_blank">⚙ Options</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
